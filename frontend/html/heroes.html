<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Marvel Heroes – Browse all your favorite Marvel superheroes, their powers, and abilities." />
  <title>Heroes – Marvel Universe</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="page-wrapper">

    <!-- ── Page Banner ── -->
    <section class="page-banner" style="padding-top:6rem;">
      <div class="liquid-ring" style="width:300px;height:300px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);"></div>
      <span class="section-label">Earth's Mightiest</span>
      <h1 class="page-banner-title">MARVEL <span style="color:var(--red);-webkit-text-fill-color:var(--red);">HEROES</span></h1>
      <p class="page-banner-sub">Assemble. Every hero with their unique powers, origin stories, and legendary abilities.</p>
    </section>

    <!-- ── Content ── -->
    <section class="section" style="padding-top:1rem;">

      <!-- Search + Filter -->
      <div class="search-filter-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="search" id="hero-search" class="search-input" placeholder="Search heroes, real names, powers..." autocomplete="off" />
        </div>
      </div>

      <!-- Heroes Grid -->
      <div class="grid-3" id="heroes-grid">
        <div class="loader-wrap"><div class="loader"></div><p style="color:var(--text-muted);font-size:0.85rem;">Loading Heroes...</p></div>
      </div>

    </section>
  </main>

  <footer class="footer" id="main-footer"></footer>

  <script src="js/main.js"></script>
  <script src="js/heroes.js"></script>
</body>
</html>
