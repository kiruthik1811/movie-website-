<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Marvel Comics – Explore the legendary comic books that built the Marvel Universe." />
  <title>Comics – Marvel Universe</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="page-wrapper">

    <!-- ── Page Banner ── -->
    <section class="page-banner" style="padding-top:6rem;">
      <span class="section-label">The Origin Stories</span>
      <h1 class="page-banner-title">MARVEL <span style="color:var(--red);-webkit-text-fill-color:var(--red);">COMICS</span></h1>
      <p class="page-banner-sub">The legendary issues that changed everything — from Spider-Man's debut to the Infinity Gauntlet.</p>
    </section>

    <!-- ── Comics Grid ── -->
    <section class="section" style="padding-top:1rem;">
      <div class="grid-3" id="comics-grid">
        <div class="loader-wrap"><div class="loader"></div><p style="color:var(--text-muted);">Loading comics...</p></div>
      </div>
    </section>

  </main>

  <footer class="footer" id="main-footer"></footer>

  <script src="js/main.js"></script>
  <script src="js/comics.js"></script>
</body>
</html>
